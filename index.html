<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Rename Tool</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

</head>

<body>

<h2>📄 Upload PDF</h2>

<input type="file" id="files" multiple>
<br><br>

<button onclick="processFiles()">▶️ Rename & Download</button>

<pre id="log"></pre>

<script>
function log(msg){
  document.getElementById("log").textContent += msg + "\n";
}

async function processFiles(){
  const files = document.getElementById("files").files;

  for(let file of files){
    if(!file.name.toLowerCase().endsWith(".pdf")) continue;

    log("Processing: " + file.name);

    const worker = await Tesseract.createWorker();
    await worker.loadLanguage('eng');
    await worker.initialize('eng');

    const { data: { text } } = await worker.recognize(file);

    await worker.terminate();

    // ✅ Extract
    let start = text.match(/Start Date\s*(.*)/);
    let product = text.match(/Product\s*(.*)/);
    let serial = text.match(/Serial Number\s*(\d+)/);

    start = start ? start[1].trim() : "";
    product = product ? product[1].trim().replaceAll(" ", "_") : "";
    serial = serial ? serial[1] : "";

    // ✅ format date
    let date = "UnknownDate";
    try{
      let d = new Date(start);
      date = d.toISOString().slice(0,10).replace(/-/g,"");
    }catch{}

    let newName = `${date}_${product}_${serial}_ServiceReport.pdf`;

    log("👉 New Name: " + newName);

    // ✅ สร้างไฟล์ download
    const blob = new Blob([file], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = newName;
    a.click();

    URL.revokeObjectURL(url);
  }

  log("✅ DONE");
}
</script>

</body>
</html>
