<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QIAGEN FINAL FIX</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {font-family:Arial;background:#eef3f7;padding:40px;}
.card {
 max-width:600px;margin:auto;background:white;padding:25px;
 border-radius:10px;box-shadow:0 10px 20px rgba(0,0,0,0.1);
}
button {
 width:100%;padding:12px;background:#0078D4;color:white;
 border:none;border-radius:6px;margin-top:10px;
}
#log {
 background:black;color:#00ff9c;padding:10px;
 height:220px;overflow:auto;margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
<h2>📄 QIAGEN FINAL TOOL</h2>

<input type="file" id="files" multiple>
<button onclick="run()">▶ Rename & Download</button>

<pre id="log"></pre>
</div>

<script>
function log(msg){
 let box=document.getElementById("log");
 box.textContent+=msg+"\n";
 box.scrollTop=box.scrollHeight;
}

async function run(){

 const input = document.getElementById("files");

 // ✅ FIX: copy files array ก่อน async
 const files = Array.from(input.files);

 if(files.length === 0){
    log("❌ กรุณาเลือกไฟล์ก่อน");
    return;
 }

 for(let file of files){

  log("Processing: "+file.name);

  const worker = await Tesseract.createWorker();
  await worker.loadLanguage("eng");
  await worker.initialize("eng");

  const { data: { text } } = await worker.recognize(file);
  await worker.terminate();

  log("---- OCR PREVIEW ----");
  log(text.substring(0,120));

  // ✅ extract ใหม่แบบ robust
  let numbers = text.match(/\d+/g);

  let serial = "UnknownSN";
  if(numbers){
    numbers.sort((a,b)=>b.length-a.length);
    serial = numbers.find(n => n.length >= 7) || "UnknownSN";
  }

  let date = "UnknownDate";
  let dateMatch = text.match(/\d{1,2}\/\d{1,2}\/\d{4}/);

  if(dateMatch){
    let d = new Date(dateMatch[0]);
    date = d.toISOString().slice(0,10).replace(/-/g,"");
  }

  let product = "QIAstat-Dx_Analytical_Module";

  let newName = `${date}_${product}_${serial}_ServiceReport.pdf`;

  log("✅ RESULT: "+newName);

  // ✅ download
  const blob = new Blob([file], {type:"application/pdf"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = newName;
  a.click();

  URL.revokeObjectURL(url);
 }

 log("✅ DONE");
}
</script>

</body>
</html>
