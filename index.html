<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>QIAGEN PDF Rename Tool</title>

<!-- ✅ โหลด OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f7;
    padding: 30px;
}
h2 { color:#2c3e50; }
button {
    padding: 10px 20px;
    background: #0078D4;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover { background:#005ea6; }
#log {
    margin-top:20px;
    background:#111;
    color:#00ff9c;
    padding:10px;
    height:250px;
    overflow:auto;
}
</style>

</head>

<body>

<h2>📄 QIAGEN PDF Rename Tool</h2>

<input type="file" id="files" multiple>
<br><br>

<button onclick="processFiles()">▶ Rename & Download</button>

<pre id="log"></pre>

<script>
function log(msg){
  document.getElementById("log").textContent += msg + "\n";
}

async function processFiles(){
  const files = document.getElementById("files").files;

  for(let file of files){

    if(!file.name.toLowerCase().endsWith(".pdf")) continue;

    log("Processing: " + file.name);

    const worker = await Tesseract.createWorker();

    await worker.loadLanguage('eng');
    await worker.initialize('eng');

    const { data: { text } } = await worker.recognize(file);

    await worker.terminate();

    console.log(text);

    // ✅ ดึงข้อมูลแบบ robust (ใช้ได้กับ PDF ของคุณ)
    let dateMatch = text.match(/\d{1,2}\/\d{1,2}\/\d{4}/);
    let serialMatch = text.match(/\b\d{8}\b/);

    let product = "QIAstat-Dx_Analytical_Module";

    let date = "UnknownDate";
    if(dateMatch){
        let d = new Date(dateMatch[0]);
        date = d.toISOString().slice(0,10).replace(/-/g,"");
    }

    let serial = serialMatch ? serialMatch[0] : "UnknownSN";

    let newName = `${date}_${product}_${serial}_ServiceReport.pdf`;

    log("✅ " + newName);

    // ✅ download file
    const blob = new Blob([file], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = newName;
    a.click();

    URL.revokeObjectURL(url);
  }

  log("✅ DONE");
}
</script>

</body>
</html>
