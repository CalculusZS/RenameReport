<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QIAGEN Rename Tool (FINAL)</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    padding: 40px;
}
.card {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}
button {
    width: 100%;
    padding: 12px;
    background: #0078D4;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    font-size: 16px;
}
button:hover {background:#005ea6;}
#log {
    background:black;
    color:#00ff9c;
    padding:10px;
    margin-top:15px;
    height:200px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="card">

<h2>📄 QIAGEN PDF Rename Tool</h2>

<input type="file" id="files" multiple>

<button onclick="run()">▶ Rename & Download</button>

<pre id="log"></pre>

</div>

<script>
function log(msg){
  let box = document.getElementById("log");
  box.textContent += msg + "\n";
  box.scrollTop = box.scrollHeight;
}

async function run(){

  const files = document.getElementById("files").files;

  for (let file of files){

    if(!file.name.endsWith(".pdf")) continue;

    log("Processing: " + file.name);

    const worker = await Tesseract.createWorker();
    await worker.loadLanguage("eng");
    await worker.initialize("eng");

    const { data: { text } } = await worker.recognize(file);

    await worker.terminate();

    log("---- OCR ----");
    log(text.substring(0,200));

    // ✅ FIX: ไม่ใช้ regex ซับซ้อนอีกแล้ว
    // 👉 ค้น date จาก "Start Date"
    let date = "UnknownDate";

    let lines = text.split("\n");
    for(let l of lines){
        if(l.toLowerCase().includes("start date")){
            let d = l.match(/\d{1,2}\/\d{1,2}\/\d{4}/);
            if(d){
                let dt = new Date(d[0]);
                date = dt.toISOString().slice(0,10).replace(/-/g,"");
                break;
            }
        }
    }

    // ✅ หา serial (เอาเลขยาวสุด)
    let numbers = text.match(/\d{6,9}/g);
    let serial = "UnknownSN";
    if(numbers){
        serial = numbers.sort((a,b)=>b.length-a.length)[0];
    }

    // ✅ product fix สำหรับ QIAGEN
    let product = "QIAstat-Dx_Analytical_Module";

    let newName = `${date}_${product}_${serial}_ServiceReport.pdf`;

    log("✅ RESULT: " + newName);

    // ✅ download
    const blob = new Blob([file], {type:"application/pdf"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = newName;
    a.click();

    URL.revokeObjectURL(url);

  }

  log("✅ DONE");
}
</script>

</body>
</html>
