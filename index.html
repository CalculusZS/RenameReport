<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QIAGEN PDF Rename Tool</title>

<!-- ✅ OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg, #eef2f7, #d6e4f0);
    margin: 0;
    padding: 40px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
    margin-top: 0;
    color: #1f4e79;
}

input {
    margin-top: 10px;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #0078D4;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #005ea6;
}

#log {
    margin-top: 20px;
    background: #111;
    color: #00ff9c;
    padding: 15px;
    border-radius: 6px;
    height: 250px;
    overflow-y: auto;
    font-size: 13px;
}

.progress {
    margin-top: 15px;
    background: #eee;
    border-radius: 6px;
    overflow: hidden;
    height: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #28a745;
    transition: 0.3s;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 QIAGEN PDF Rename Tool</h2>

<input type="file" id="files" multiple>

<button onclick="processFiles()">▶ Rename & Download</button>

<div class="progress"><div class="bar" id="bar"></div></div>

<pre id="log"></pre>

</div>

<script>
function log(msg){
  const logBox = document.getElementById("log");
  logBox.textContent += msg + "\n";
  logBox.scrollTop = logBox.scrollHeight;
}

function updateProgress(p){
  document.getElementById("bar").style.width = p + "%";
}

async function processFiles(){
  const files = document.getElementById("files").files;

  let i = 0;

  for(let file of files){

    if(!file.name.toLowerCase().endsWith(".pdf")) continue;

    log("Processing: " + file.name);

    const worker = await Tesseract.createWorker();

    await worker.loadLanguage('eng');
    await worker.initialize('eng');

    const { data: { text } } = await worker.recognize(file);

    await worker.terminate();

    console.log(text);

    // ✅ Extract แบบใช้ได้กับไฟล์คุณ
    let dateMatch = text.match(/\d{1,2}\/\d{1,2}\/\d{4}/);
    let serialMatch = text.match(/\b\d{7,9}\b/);

    let product = "QIAstat-Dx_Analytical_Module";

    let date = "UnknownDate";
    if(dateMatch){
        let d = new Date(dateMatch[0]);
        date = d.toISOString().slice(0,10).replace(/-/g,"");
    }

    let serial = serialMatch ? serialMatch[0] : "UnknownSN";

    let newName = `${date}_${product}_${serial}_ServiceReport.pdf`;

    log("✅ " + newName);

    // ✅ download
    const blob = new Blob([file], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = newName;
    a.click();

    URL.revokeObjectURL(url);

    i++;
    updateProgress((i/files.length)*100);
  }

  log("✅ DONE");
}
</script>

</body>
</html>
